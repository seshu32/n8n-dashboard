<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>N8n Workflow Health Dashboard</title>
  <style>
    :root {
      --bg: #090b14;
      --panel: rgba(17, 18, 31, 0.88);
      --panel-border: rgba(255, 255, 255, 0.07);
      --text: #f3f2f7;
      --muted: #a7a8b8;
      --grid: rgba(86, 131, 109, 0.18);
      --green: #63c487;
      --green-soft: #88d8a1;
      --red: #f35e56;
      --red-bar: #9e2d30;
      --blue: #7d9bff;
      --amber: #f7c96f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, "Segoe UI", system-ui, -apple-system, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 4% 4%, rgba(241, 93, 83, 0.26), transparent 18%),
        radial-gradient(circle at 82% 12%, rgba(63, 95, 190, 0.12), transparent 20%),
        radial-gradient(circle at 50% 45%, rgba(255, 255, 255, 0.02), transparent 32%),
        var(--bg);
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.28;
      background-image:
        radial-gradient(circle at 15% 30%, rgba(255, 255, 255, 0.7) 0 1px, transparent 1.5px),
        radial-gradient(circle at 70% 20%, rgba(255, 255, 255, 0.5) 0 1px, transparent 1.5px),
        radial-gradient(circle at 60% 75%, rgba(255, 255, 255, 0.45) 0 1px, transparent 1.5px),
        radial-gradient(circle at 35% 80%, rgba(255, 255, 255, 0.35) 0 1px, transparent 1.5px);
      background-size: 220px 220px, 280px 280px, 240px 240px, 300px 300px;
    }

    .dashboard {
      max-width: 1168px;
      margin: 0 auto;
      padding: 18px 22px 26px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-end;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: 42px;
      line-height: 1.1;
      letter-spacing: -0.03em;
      font-weight: 800;
    }

    .headline-copy {
      max-width: 760px;
    }

    .headline-meta {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .meta-pill {
      display: inline-flex;
      align-items: center;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 14px;
    }

    .panel {
      background: linear-gradient(180deg, rgba(18, 20, 35, 0.95), rgba(15, 16, 29, 0.88));
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03), 0 0 0 1px rgba(255, 255, 255, 0.01);
      backdrop-filter: blur(10px);
    }

    .metric {
      padding: 12px 16px 14px;
      min-height: 118px;
    }

    .metric-title {
      color: #f0f0f4;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .metric-value {
      font-size: 25px;
      line-height: 1;
      letter-spacing: -0.03em;
      margin-bottom: 11px;
      color: #f3f4fa;
    }

    .metric-subtitle {
      color: var(--muted);
      font-size: 12px;
      margin-top: -3px;
      margin-bottom: 11px;
    }

    .delta {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
    }

    .delta strong {
      font-size: 15px;
      font-weight: 700;
    }

    .delta.positive strong,
    .delta.positive .arrow {
      color: var(--green);
    }

    .delta.negative strong,
    .delta.negative .arrow {
      color: var(--red);
    }

    .delta.neutral strong,
    .delta.neutral .arrow {
      color: var(--amber);
    }

    .arrow {
      font-size: 14px;
      transform: translateY(-1px);
    }

    .mid-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.58fr) minmax(310px, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }

    .panel-title {
      margin: 0 0 10px;
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #f2f2f7;
    }

    .chart-panel,
    .failure-panel,
    .bottom-panel,
    .empty-state {
      padding: 12px 14px 10px;
    }

    .chart-wrap svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .legend {
      display: flex;
      gap: 16px;
      margin-top: 10px;
      padding-left: 8px;
      color: #cac9d4;
      font-size: 13px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.08);
    }

    .mini-table,
    .data-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .mini-table {
      font-size: 13px;
      color: #e9e9ef;
    }

    .mini-table thead th {
      color: #d8d8e3;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 0 9px;
      text-align: left;
    }

    .mini-table tbody tr,
    .data-table tbody tr {
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .mini-table td {
      padding: 7px 0;
      vertical-align: middle;
      color: #e5e5ed;
    }

    .mini-table td.num {
      text-align: center;
      color: #ededf6;
    }

    .workflow-name {
      line-height: 1.2;
      color: #d8d9e6;
      padding-right: 8px;
      word-break: break-word;
    }

    .bar-track {
      width: 92px;
      height: 16px;
      background: transparent;
      position: relative;
    }

    .bar-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 16px;
      background: linear-gradient(90deg, #8b2429, #b53337);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
    }

    .bar-value {
      position: absolute;
      top: 50%;
      left: 8px;
      transform: translateY(-50%);
      color: #f5dbdd;
      font-size: 12px;
      font-weight: 700;
    }

    .bottom-title {
      margin: 0 0 12px;
      padding-left: 2px;
      font-size: 17px;
      font-weight: 800;
      color: #f1f1f6;
    }

    .data-table {
      font-size: 15px;
    }

    .data-table thead th {
      text-align: left;
      padding: 8px 10px;
      color: #f1f0f6;
      font-weight: 800;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
    }

    .data-table tbody td {
      padding: 8px 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      color: #dfe0ea;
      line-height: 1.1;
    }

    .data-table .num {
      text-align: right;
      color: #e8e9f2;
      width: 100px;
    }

    .data-table .rate {
      text-align: right;
      color: var(--green-soft);
      font-weight: 700;
      width: 120px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 62px;
      padding: 4px 10px;
      border-radius: 8px;
      background: rgba(101, 198, 135, 0.18);
      color: #b9edc8;
      border: 1px solid rgba(101, 198, 135, 0.1);
    }

    .open-link {
      color: var(--blue);
      text-decoration: none;
      font-weight: 500;
    }

    .open-link:hover {
      text-decoration: underline;
    }

    .empty-state {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    @media (max-width: 980px) {
      .cards,
      .mid-grid {
        grid-template-columns: 1fr 1fr;
      }

      h1 {
        font-size: 34px;
      }
    }

    @media (max-width: 760px) {
      .dashboard {
        padding: 16px;
      }

      .cards,
      .mid-grid {
        grid-template-columns: 1fr;
      }

      .data-table,
      .mini-table {
        font-size: 13px;
      }

      .data-table th,
      .data-table td {
        padding-left: 6px;
        padding-right: 6px;
      }

      h1 {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <main class="dashboard">
    <section class="topbar">
      <div class="headline-copy">
        <h1>N8n Workflow Health Dashboard</h1>
        <div class="headline-meta" id="headline-meta"></div>
      </div>
    </section>

    <section class="cards" id="metric-cards"></section>

    <section class="mid-grid">
      <article class="panel chart-panel">
        <h2 class="panel-title">Executions Over Time</h2>
        <div class="chart-wrap" id="chart-wrap"></div>
        <div class="legend">
          <span class="legend-item"><span class="legend-dot" style="background:#6fd08c"></span>Successful</span>
          <span class="legend-item"><span class="legend-dot" style="background:#f15c52"></span>Failed</span>
        </div>
      </article>

      <article class="panel failure-panel">
        <h2 class="panel-title">Failures by Workflow</h2>
        <div id="failure-table"></div>
      </article>
    </section>

    <section class="panel bottom-panel">
      <h2 class="bottom-title">Active Workflows</h2>
      <div id="workflow-table"></div>
    </section>
  </main>

  <script src="./dashboard-data.js"></script>
  <script>
    const dashboardData = window.__DASHBOARD_DATA__ || null;

    if (!dashboardData) {
      renderMissingDataState();
    } else {
      renderDashboard(dashboardData);
    }

    function renderDashboard(data) {
      renderHeadlineMeta(data);
      renderMetricCards(data);
      renderTrendChart(data.trend || []);
      renderFailureTable(data.topFailures || []);
      renderWorkflowTable(data.rows || []);
    }

    function renderHeadlineMeta(data) {
      const generatedAt = data.generatedAt ? new Date(data.generatedAt) : null;
      const generatedLabel = generatedAt && !Number.isNaN(generatedAt.getTime())
        ? generatedAt.toLocaleString("en-IN", {
            year: "numeric",
            month: "short",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit",
          })
        : "Not generated yet";

      document.getElementById("headline-meta").innerHTML = [
        createMetaPill(`Report Day: ${escapeHtml(data.reportDateLabel || "N/A")}`),
        createMetaPill(`Window: ${escapeHtml(data.windowLabel || "N/A")}`),
        createMetaPill(`Active Workflows: ${formatInteger(data.summary?.activeWorkflows || 0)}`),
        createMetaPill(`Updated: ${escapeHtml(generatedLabel)}`),
      ].join("");
    }

    function renderMetricCards(data) {
      const summary = data.summary || {};
      const cards = [
        {
          title: "Workflows Ran",
          value: formatInteger(summary.workflowsRan || 0),
          subtitle: `${formatInteger(summary.activeWorkflows || 0)} active workflows in n8n`,
          delta: renderDelta(summary.deltas?.workflowsRan || 0, false, "vs previous day"),
        },
        {
          title: "Total Executions",
          value: formatInteger(summary.totalExecutions || 0),
          delta: renderDelta(summary.deltas?.totalExecutions || 0, false, "vs previous day"),
        },
        {
          title: "Failed Executions",
          value: formatInteger(summary.failedExecutions || 0),
          delta: renderDelta(summary.deltas?.failedExecutions || 0, true, "vs previous day"),
        },
        {
          title: "Success Rate",
          value: formatPercent(summary.successRate || 0),
          delta: renderDelta(summary.deltas?.successRate || 0, false, "pts vs previous day", true),
        },
      ];

      document.getElementById("metric-cards").innerHTML = cards
        .map((card) => `
          <article class="panel metric">
            <div class="metric-title">${escapeHtml(card.title)}</div>
            <div class="metric-value">${escapeHtml(card.value)}</div>
            ${card.subtitle ? `<div class="metric-subtitle">${escapeHtml(card.subtitle)}</div>` : ""}
            ${card.delta}
          </article>
        `)
        .join("");
    }

    function renderTrendChart(trend) {
      const target = document.getElementById("chart-wrap");
      if (!trend.length) {
        target.innerHTML = `<div class="empty-state">No execution history is available for the chart yet.</div>`;
        return;
      }

      const width = 660;
      const height = 208;
      const left = 36;
      const right = 20;
      const top = 24;
      const bottom = 48;
      const chartWidth = width - left - right;
      const chartHeight = height - top - bottom;
      const maxValue = Math.max(
        5,
        ...trend.map((point) => Math.max(point.successfulExecutions || 0, point.failedExecutions || 0))
      );
      const yAxisMax = roundUpMax(maxValue);
      const gridTicks = [yAxisMax, Math.round(yAxisMax * 0.67), Math.round(yAxisMax * 0.33), 0];
      const xStep = trend.length > 1 ? chartWidth / (trend.length - 1) : 0;

      const greenPoints = trend.map((point, index) => {
        return toPoint(
          left + index * xStep,
          top + chartHeight - ((point.successfulExecutions || 0) / yAxisMax) * chartHeight
        );
      });

      const redPoints = trend.map((point, index) => {
        return toPoint(
          left + index * xStep,
          top + chartHeight - ((point.failedExecutions || 0) / yAxisMax) * chartHeight
        );
      });

      const labelY = top + chartHeight + 26;

      target.innerHTML = `
        <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="Executions chart">
          <defs>
            <filter id="softGlow">
              <feGaussianBlur stdDeviation="2.2" result="blur"></feGaussianBlur>
              <feMerge>
                <feMergeNode in="blur"></feMergeNode>
                <feMergeNode in="SourceGraphic"></feMergeNode>
              </feMerge>
            </filter>
          </defs>

          <g font-size="12" fill="#aeafbc" font-family="Inter, Segoe UI, sans-serif">
            ${gridTicks.map((tick, index) => {
              const y = top + (chartHeight / (gridTicks.length - 1)) * index + 4;
              return `<text x="4" y="${y}">${formatInteger(tick)}</text>`;
            }).join("")}
          </g>

          <g stroke="var(--grid)" stroke-width="1">
            ${gridTicks.map((_, index) => {
              const y = top + (chartHeight / (gridTicks.length - 1)) * index;
              return `<line x1="${left}" y1="${y}" x2="${width - right}" y2="${y}"></line>`;
            }).join("")}
          </g>

          <g stroke="rgba(255,255,255,0.08)" stroke-width="1">
            <line x1="${left}" y1="${top + chartHeight}" x2="${width - right}" y2="${top + chartHeight}"></line>
          </g>

          <g font-size="12" fill="#aeafbc" font-family="Inter, Segoe UI, sans-serif">
            ${trend.map((point, index) => {
              const x = left + index * xStep - 18;
              return `<text x="${x}" y="${labelY}">${escapeHtml(point.label || "")}</text>`;
            }).join("")}
          </g>

          <polyline fill="none" stroke="#6fd08c" stroke-width="2.2" points="${greenPoints.join(" ")}" filter="url(#softGlow)"></polyline>
          <polyline fill="none" stroke="#f15c52" stroke-width="2.2" points="${redPoints.join(" ")}" filter="url(#softGlow)"></polyline>

          <g fill="#6fd08c">
            ${greenPoints.map((point) => {
              const [x, y] = point.split(",");
              return `<circle cx="${x}" cy="${y}" r="3"></circle>`;
            }).join("")}
          </g>

          <g fill="#f15c52">
            ${redPoints.map((point) => {
              const [x, y] = point.split(",");
              return `<circle cx="${x}" cy="${y}" r="3"></circle>`;
            }).join("")}
          </g>
        </svg>
      `;
    }

    function renderFailureTable(rows) {
      const target = document.getElementById("failure-table");
      if (!rows.length) {
        target.innerHTML = `<div class="empty-state">No failed workflow executions were recorded in this reporting window.</div>`;
        return;
      }

      target.innerHTML = `
        <table class="mini-table">
          <colgroup>
            <col style="width:40%">
            <col style="width:12%">
            <col style="width:12%">
            <col style="width:16%">
            <col style="width:20%">
          </colgroup>
          <thead>
            <tr>
              <th>Workflow</th>
              <th>Runs</th>
              <th>Failed</th>
              <th>Success</th>
              <th>Failure Rate</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map((row) => `
              <tr>
                <td class="workflow-name">${escapeHtml(row.name)}</td>
                <td class="num">${formatInteger(row.runs)}</td>
                <td class="num">${formatInteger(row.failed)}</td>
                <td class="num">${formatInteger(row.success)}</td>
                <td>
                  <div class="bar-track">
                    <div class="bar-fill" style="width:${Math.max(6, Math.min(92, (Number(row.failureRate) / 100) * 92))}px;"></div>
                    <span class="bar-value">${escapeHtml(formatPercent(row.failureRate))}</span>
                  </div>
                </td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function renderWorkflowTable(rows) {
      const target = document.getElementById("workflow-table");
      if (!rows.length) {
        target.innerHTML = `<div class="empty-state">No active workflow data is available yet.</div>`;
        return;
      }

      target.innerHTML = `
        <table class="data-table">
          <colgroup>
            <col style="width:50%">
            <col style="width:9%">
            <col style="width:9%">
            <col style="width:11%">
            <col style="width:12%">
            <col style="width:8%">
            <col style="width:6%">
          </colgroup>
          <thead>
            <tr>
              <th>Workflow</th>
              <th class="num">Runs</th>
              <th class="num">Failed</th>
              <th class="num">Success</th>
              <th class="num">Success Rate</th>
              <th class="num" style="text-align:center;">Status</th>
              <th class="num" style="text-align:left;">Link</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map((row) => `
              <tr>
                <td>${escapeHtml(row.name)}</td>
                <td class="num">${formatInteger(row.runs)}</td>
                <td class="num">${formatInteger(row.failed)}</td>
                <td class="num">${formatInteger(row.success)}</td>
                <td class="rate">${escapeHtml(formatPercent(row.successRate))}</td>
                <td class="num" style="text-align:center;"><span class="status">Active</span></td>
                <td class="num" style="text-align:left;"><a class="open-link" href="${escapeHtml(row.link)}" target="_blank" rel="noreferrer">Open</a></td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function renderMissingDataState() {
      document.getElementById("headline-meta").innerHTML = createMetaPill("Dashboard data has not been generated yet");
      document.getElementById("metric-cards").innerHTML = `
        <article class="panel empty-state">
          Run <code>node .\\send-n8n-report.mjs</code> once to generate <code>dashboard-data.js</code> from your n8n data.
        </article>
      `;
      document.getElementById("chart-wrap").innerHTML = `<div class="empty-state">No dashboard snapshot found.</div>`;
      document.getElementById("failure-table").innerHTML = `<div class="empty-state">No dashboard snapshot found.</div>`;
      document.getElementById("workflow-table").innerHTML = `<div class="empty-state">No dashboard snapshot found.</div>`;
    }

    function renderDelta(rawValue, invertMeaning, suffix, percentagePoints) {
      const value = Number(rawValue || 0);
      const neutral = Math.abs(value) < 0.005;
      const positive = invertMeaning ? value <= 0 : value >= 0;
      const tone = neutral ? "neutral" : positive ? "positive" : "negative";
      const arrow = neutral ? "&#8594;" : positive ? "&#8599;" : "&#8600;";
      const sign = value > 0 ? "+" : "";
      const formattedValue = percentagePoints
        ? `${sign}${value.toFixed(2)}`
        : `${sign}${formatInteger(value)}`;

      return `
        <div class="delta ${tone}">
          <span class="arrow">${arrow}</span>
          <strong>${escapeHtml(formattedValue)}</strong>
          <span>${escapeHtml(suffix)}</span>
        </div>
      `;
    }

    function createMetaPill(text) {
      return `<span class="meta-pill">${escapeHtml(text)}</span>`;
    }

    function toPoint(x, y) {
      return `${Number(x).toFixed(1)},${Number(y).toFixed(1)}`;
    }

    function roundUpMax(value) {
      if (value <= 10) {
        return 10;
      }

      const magnitude = Math.pow(10, Math.floor(Math.log10(value)));
      return Math.ceil(value / magnitude) * magnitude;
    }

    function formatPercent(value) {
      return `${Number(value || 0).toFixed(2)}%`;
    }

    function formatInteger(value) {
      return Number(value || 0).toLocaleString("en-IN");
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }
  </script>
</body>
</html>
